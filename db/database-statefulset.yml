apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database-statefulset
spec:
  selector:
    matchLabels:
      app: database
  serviceName: "database"
  replicas: 2 # by default is 1
  minReadySeconds: 10 # by default is 0
  template:
    metadata:
      labels:
        app: database
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: database
        image: mongo
        ports:
        - containerPort: 27017
          name: database
        volumeMounts:
        - name: database-data
          mountPath: /data/db
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: mongo-root-username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: mongo-root-password
  volumeClaimTemplates:
  - metadata:
      name: database-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: database-storage-local
      resources:
        requests:
          storage: 5Gi
